# Override for local build — modular-service and modular-api disabled.
# Used by local-install.sh. Do not use standalone; run ./local-install.sh instead.
#
# Image is built and loaded by local-install.sh into Minikube (profile: rule-engine).
image:
  repository: local/rule-engine
  tag: "latest"
  pullPolicy: Never

modular-service:
  enabled: false

modular-api:
  enabled: false

logLevel: DEBUG
executorLogLevel: DEBUG
executorCCLogLevel: DEBUG

modularSdk:
  logLevel: DEBUG

celery:
  logLevel: DEBUG
