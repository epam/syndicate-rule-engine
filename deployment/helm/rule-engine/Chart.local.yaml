# Local build (no S3 repo). Substituted by local-install.sh; do not use directly.
# Dependencies: vault, minio, mongo, redis from file://../ (modular-service, modular-api excluded).
apiVersion: v2
appVersion: "5.18.0"
description: A Helm chart for the rule-engine (local build)
name: rule-engine
type: application
version: "5.18.0"
dependencies:
  - name: vault
    repository: "file://../vault"
    version: "^1.2.1"
    condition: vault.enabled
  - name: minio
    repository: "file://../minio"
    version: "1.3.0"
    condition: minio.enabled
  - name: mongo
    repository: "file://../mongo"
    version: "^1.1.1"
    condition: mongo.enabled
  - name: redis
    repository: "file://../redis"
    version: "^1.1.0"
    condition: redis.enabled
  # modular-service and modular-api disabled (no local charts)
